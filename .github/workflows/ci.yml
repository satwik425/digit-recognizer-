name: CI/CD — Digit Recognizer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ──────────────────────────────
  backend-test:
    name: Backend — pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install fastapi uvicorn pillow numpy python-multipart pydantic pytest httpx
          pip install tensorflow-cpu || pip install tensorflow

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ── Frontend build ─────────────────────────────
  frontend-build:
    name: Frontend — React build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build
        run: |
          cd frontend
          REACT_APP_API_URL=https://placeholder.onrender.com npm run build
        env:
          CI: false

  # ── Deploy backend to Render ───────────────────
  deploy-backend:
    name: Deploy — Render
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: |
          echo "Add RENDER_API_KEY and RENDER_SERVICE_ID to GitHub secrets to enable auto deploy"

  # ── Deploy frontend to Vercel ──────────────────
  deploy-frontend:
    name: Deploy — Vercel
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy notice
        run: |
          echo "Add VERCEL_TOKEN to GitHub secrets to enable auto deploy"